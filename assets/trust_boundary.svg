<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="642" viewBox="0 0 1180 642" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="8" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#64748b"/>
    </marker>
    <symbol id="lock" viewBox="0 0 14 16">
      <path d="M3.2,7 V4.8 a3.8,3.8 0 0 1 7.6,0 V7" fill="none" stroke="#64748b" stroke-width="1.4"/>
      <rect x="1.4" y="7" width="11.2" height="8" rx="1.6" fill="#334155" stroke="#64748b" stroke-width="1"/>
    </symbol>
  </defs>

  <rect width="1180" height="642" fill="#0f172a"/>

  <text x="590" y="46" text-anchor="middle" fill="#f1f5f9" font-size="27" font-weight="700">The trust boundary: what the server can and cannot see</text>
  <text x="590" y="76" text-anchor="middle" fill="#94a3b8" font-size="15">The server stores and routes everything, and can read none of it.</text>

  <!-- boundary -->
  <line x1="590" y1="120" x2="590" y2="452" stroke="#475569" stroke-width="1.6" stroke-dasharray="4 6"/>
  <text x="590" y="110" text-anchor="middle" fill="#64748b" font-size="12" font-family="monospace" letter-spacing="1">TRUST BOUNDARY</text>

  <!-- left panel: device -->
  <rect x="70" y="128" width="480" height="272" rx="12" fill="#0d1a30" stroke="#1e293b" stroke-width="1.4"/>
  <text x="98" y="162" fill="#60a5fa" font-size="17" font-weight="700">On the member's device</text>
  <text x="98" y="184" fill="#94a3b8" font-size="13">Trusted. Sees plaintext and holds every key.</text>
  <g fill="#cbd5e1" font-size="14.5">
    <circle cx="104" cy="223" r="4" fill="#60a5fa"/><text x="120" y="228">Photos and metadata, in the clear</text>
    <circle cx="104" cy="263" r="4" fill="#60a5fa"/><text x="120" y="268">MEK, epoch keys, and post keys</text>
    <circle cx="104" cy="303" r="4" fill="#60a5fa"/><text x="120" y="308">Search terms, before blinding</text>
    <circle cx="104" cy="343" r="4" fill="#60a5fa"/><text x="120" y="348">Decryption happens here, never server-side</text>
  </g>

  <!-- right panel: server -->
  <rect x="630" y="128" width="480" height="272" rx="12" fill="#0d1a30" stroke="#1e293b" stroke-width="1.4"/>
  <text x="658" y="162" fill="#cbd5e1" font-size="17" font-weight="700">On the server</text>
  <text x="658" y="184" fill="#94a3b8" font-size="13">Untrusted. Stores and routes, reads nothing.</text>
  <g fill="#cbd5e1" font-size="14.5">
    <use href="#lock" x="656" y="215" width="14" height="16"/><text x="680" y="228">Encrypted content (AES-256-GCM)</text>
    <use href="#lock" x="656" y="255" width="14" height="16"/><text x="680" y="268">Wrapped key bundles (AES-KW)</text>
    <use href="#lock" x="656" y="295" width="14" height="16"/><text x="680" y="308">Blind-index tags (HMAC-SHA256)</text>
    <use href="#lock" x="656" y="335" width="14" height="16"/><text x="680" y="348">Public keys, routed for sharing</text>
  </g>

  <!-- crossing arrow -->
  <line x1="330" y1="432" x2="850" y2="432" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="590" y="423" text-anchor="middle" fill="#94a3b8" font-size="13">content is encrypted on the device, then uploaded</text>

  <!-- callout -->
  <rect x="70" y="470" width="1040" height="132" rx="12" fill="#111c33" stroke="#233350" stroke-width="1.4"/>
  <text x="102" y="506" fill="#e2e8f0" font-size="16" font-weight="700">Everything that crosses the boundary is opaque to the server.</text>
  <text x="102" y="532" fill="#94a3b8" font-size="14">Storing and routing ciphertext is all it can do. That property is what "zero-knowledge" names.</text>
  <text x="102" y="572" fill="#64748b" font-size="13.5">v1's flaw was not what the server stores. It was that the server also hands out the public keys used to</text>
  <text x="102" y="590" fill="#64748b" font-size="13.5">share content, without verification. That is the break shown in the handoff diagram.</text>
</svg>
